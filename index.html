<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MindQuark — Francesco Coccimiglio · Matematica & Fisica Teorica</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #eef0f3;
    --bg-deep: #e6e9ee;
    --card: #ffffff;
    --ink: #0d1220;
    --ink-2: #2a3142;
    --muted: #6b7385;
    --muted-2: #98a0b0;
    --line: #e6e9ef;
    --accent: #2563EB;
    --accent-2: #1d4ed8;
    --accent-soft: #dbe7ff;
    --good: #059669;
    --warn: #d97706;
    --bad: #dc2626;
    --radius-xl: 36px;
    --radius-lg: 28px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --shadow-card: 0 1px 2px rgba(13,18,32,0.04), 0 8px 30px rgba(13,18,32,0.06);
    --shadow-soft: 0 1px 2px rgba(13,18,32,0.03), 0 4px 16px rgba(13,18,32,0.04);
    --shadow-pop: 0 12px 40px rgba(37,99,235,0.18), 0 2px 6px rgba(13,18,32,0.06);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .display { font-family: 'Archivo', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Decorative floating spheres (like reference) */
  .sphere {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, #ffffff 0%, #f1f3f7 35%, #d6dae2 75%, #b9bfcc 100%);
    box-shadow:
      inset -6px -8px 18px rgba(120,130,150,0.25),
      inset 4px 6px 12px rgba(255,255,255,0.9),
      0 8px 30px rgba(13,18,32,0.10);
    pointer-events: none;
  }

  /* Scrollbar polish */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d4d8e0; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #b8bdc8; }

  /* Responsive */
  :root {
    --page-max: 1320px;
    --page-pad: 16px;
  }
  @media (max-width: 768px) {
    :root { --page-pad: 12px; }
    .hide-mobile { display: none !important; }
    .stack-mobile { flex-direction: column !important; }
    .grid-2 { grid-template-columns: 1fr !important; }
    .grid-3 { grid-template-columns: 1fr !important; }
    .grid-2-tablet { grid-template-columns: 1fr !important; }
    .fs-hero { font-size: 48px !important; }
    .fs-section { font-size: 36px !important; }
    .fs-cta { font-size: 48px !important; }
    .fs-card-title { font-size: 16px !important; }
    .hero-side { display: none !important; }
    .hero-padding { padding: 32px 20px !important; }
    .card-padding { padding: 40px 20px !important; }
    .nav-padding { padding: 12px 16px !important; }
    .gap-mobile { gap: 8px !important; }
  }
  @media (min-width: 769px) and (max-width: 1024px) {
    .grid-3 { grid-template-columns: repeat(2, 1fr) !important; }
    .fs-hero { font-size: 72px !important; }
    .hero-side { opacity: 0.4 !important; }
  }
  @media (min-width: 1025px) {
    .show-mobile { display: none !important; }
  }

  /* Animations */
  @keyframes float-y {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }
  @keyframes float-y-slow {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); }
    100% { box-shadow: 0 0 0 18px rgba(37,99,235,0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .anim-float { animation: float-y 4s ease-in-out infinite; }
  .anim-float-slow { animation: float-y-slow 6s ease-in-out infinite; }
  .anim-spin-slow { animation: spin-slow 24s linear infinite; }
  .anim-fade-up { animation: fade-in-up 0.6s ease-out backwards; }
  .anim-pulse { animation: pulse-ring 1.6s ease-out infinite; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 22px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border: none;
    transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: var(--shadow-pop);
  }
  .btn-primary:hover { background: var(--accent-2); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--ink);
  }
  .btn-ghost:hover { background: rgba(13,18,32,0.05); }
  .btn-light {
    background: #fff; color: var(--ink);
    box-shadow: var(--shadow-soft);
  }
  .btn-light:hover { transform: translateY(-1px); box-shadow: var(--shadow-card); }
  .btn-dark {
    background: var(--ink); color: #fff;
  }
  .btn-dark:hover { background: var(--ink-2); }

  /* Card */
  .card {
    background: var(--card);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-card);
  }

  /* Page transition */
  .page-enter { animation: fade-in-up 0.4s ease-out; }

  /* Math symbols decoration */
  .math-deco {
    position: absolute;
    color: rgba(37,99,235,0.10);
    font-family: 'Times New Roman', serif;
    font-style: italic;
    pointer-events: none;
    user-select: none;
    font-weight: 400;
  }

  /* Grid pattern */
  .grid-pattern {
    background-image:
      linear-gradient(rgba(13,18,32,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(13,18,32,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Dot icon (reference uses 9 dots in a 3x3 grid) */
  .dot-grid {
    display: grid;
    grid-template-columns: repeat(3, 4px);
    grid-template-rows: repeat(3, 4px);
    gap: 3px;
  }
  .dot-grid span {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--ink);
  }

  /* Accent text */
  .accent { color: var(--accent); }

  /* Hide root flash */
  #root:empty::after {
    content: '';
    position: fixed; inset: 0;
    background: var(--bg);
  }
</style>
</head>
<body>

<div id="root"></div>

</html>
